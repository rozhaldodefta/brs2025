<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Viewer</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .frame-container {
            width: 100vw;
            height: 100vh;
            border: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .fallback {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <!-- IFRAME untuk menampilkan index.php -->
    <iframe src="index.php"></iframe>

    <!-- Fallback jika iframe tidak bekerja -->
    <div class="fallback">
        Jika halaman tidak terbuka otomatis, klik:
        <a href="index.php">Buka index.php</a>
    </div>

</body>
</html>
